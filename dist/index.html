<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#22c55e" />
		<meta name="description" content="Track your runs with GPS and see them on a map" />
		<link rel="manifest" href="manifest.json" />
		<link rel="apple-touch-icon" href="icon-192.png" />
		<title>🦙 OllamaChat</title>
		<script type="module" crossorigin src="./assets/index-BiQjz-br.js"></script>
		<link rel="stylesheet" crossorigin href="./assets/index-BHEnYxCD.css">
	</head>
	<body>
		<header>
			<h1>🦙 OllamaChat</h1>
		</header>

		<div>
			<button id="showConfigDialog">Configuration</button>
	
			<fieldset>
				<legend>Chat History</legend>

				<label>Continue chat sesion <select id="history-combo"></select></label>				
				<button id="clear-history-button">Clear All</button>
				<div>
					<div>
						<label>Import history <input id="import-history" type="file"></label>
						<button id="import-history-button">Import</button>
					</div>
					<button id="export-history-button">Export All</button>
				</div>
			</fieldset>
	
			<dialog id="configDialog" closedby="closerequest">
				<form method="dialog">
					<fieldset class="options-container">
						<label>Host: <input type="text" id="baseUrl-input" name="baseUrl" value="http://localhost:11434/ap"></label>
						<label>Models <select id="model-combo" name="model"></select></label>
						<label>Auto read responses <input type="checkbox" id="auto-read-checkbox" name="autoRead"></label>
						<label>Voices <select id="voice-combo" name="voice"></select></label>
					</fieldset>    
					<button>Close</button>
				</form>
			</dialog>			
		</div>
		
		<div class="chat-container">
			<div id="chat-window" class="chat-window">
				<!-- Messages will appear here -->
			</div>
	
			<div class="input-area">
				<button id="mic-btn" title="Dictate">🎤</button>
				<textarea type="text" id="chat-input" placeholder="Type a message..."></textarea>
				<button id="send-btn">Send</button>
			</div>	
		</div>
	</body>
</html>
