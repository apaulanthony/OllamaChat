<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#22c55e" />
		<meta name="description" content="Track your runs with GPS and see them on a map" />
		<link rel="manifest" href="manifest.json" />
		<link rel="apple-touch-icon" href="icon-192.png" />
		<title>🦙 OllamaChat</title>
		<link rel="stylesheet" href="src/scss/styles.scss" />
		<script type="module" src="src/js/App.js" defer></script>
	</head>
	<body class="chat-container">
		<header>
			<h1>🦙 OllamaChat</h1>
		</header>

        <!--
        <fieldset id="options-fieldset">
            <legend><label>Options <input type="checkbox" id="options-checkbox" checked></label></legend>
            
            <div id="options-container" class="options-container">
                <label>Models <select id="model-combo"></select></label>
                <label>Auto read responses <input type="checkbox" id="auto-read-checkbox"></label>
                <label>Voices <select id="voice-combo"></select></label>
            </div>
        </fieldset>
        -->

        <button id="showConfigDialog">Configuration</button>

        <dialog id="configDialog" closedby="closerequest">
            <form method="dialog">
                <fieldset class="options-container">                    
                    <label>Models <select id="model-combo" name="model"></select></label>
                    <label>Auto read responses <input type="checkbox" id="auto-read-checkbox" name="auto-read"></label>
                    <label>Voices <select id="voice-combo" name="voice"></select></label>
                </fieldset>    
                <button>Close</button>
            </form>
        </dialog>
		
		<div id="chat-window" class="chat-window">
			<!-- Messages will appear here -->
		</div>

		<div class="input-area">
			<button id="mic-btn" title="Dictate">🎤</button>
			<textarea type="text" id="chat-input" placeholder="Type a message..."></textarea>
			<button id="send-btn">Send</button>
		</div>
	</body>
</html>
